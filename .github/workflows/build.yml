name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: mkdir -p keystore_details && echo "$KEYSTORE_BASE64" | base64 -d > keystore_details/antitheft.jks

      - name: Build signed release AAB
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload to Google Play
        if: github.event_name != 'pull_request'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shreyash.antitheft
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || 'internal' }}
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: whatsnew/

      - name: Bump version
        if: github.event_name != 'pull_request'
        id: bump
        run: |
          props="version.properties"
          code=$(grep "^versionCode=" "$props" | cut -d= -f2)
          new_code=$((code + 1))
          name=$(grep "^versionName=" "$props" | cut -d= -f2)
          major=$(echo "$name" | cut -d. -f1)
          minor=$(echo "$name" | cut -d. -f2)
          patch=$(echo "$name" | cut -d. -f3)
          new_patch=$((patch + 1))
          new_name="${major}.${minor}.${new_patch}"
          sed -i "s/^versionCode=.*/versionCode=$new_code/" "$props"
          sed -i "s/^versionName=.*/versionName=$new_name/" "$props"
          echo "new_version_code=$new_code" >> "$GITHUB_OUTPUT"
          echo "new_version_name=$new_name" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version_name }} (code ${{ steps.bump.outputs.new_version_code }}) [skip ci]"
          git push
