name: Release to Google Play

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      release_notes:
        description: "What's new in this release"
        type: string
        default: "Bug fixes and improvements"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shreyash.antitheft
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ startsWith(github.ref, 'refs/tags/') && 'production' || (github.event_name == 'workflow_dispatch' && github.event.inputs.track || 'internal') }}
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: whatsnew/

      - name: Bump version
        id: bump
        run: |
          props="version.properties"
          code=$(grep "^versionCode=" "$props" | cut -d= -f2)
          new_code=$((code + 1))
          name=$(grep "^versionName=" "$props" | cut -d= -f2)
          # bump patch segment of versionName
          major=$(echo "$name" | cut -d. -f1)
          minor=$(echo "$name" | cut -d. -f2)
          patch=$(echo "$name" | cut -d. -f3)
          new_patch=$((patch + 1))
          new_name="${major}.${minor}.${new_patch}"
          sed -i "s/^versionCode=.*/versionCode=$new_code/" "$props"
          sed -i "s/^versionName=.*/versionName=$new_name/" "$props"
          echo "new_version_code=$new_code" >> "$GITHUB_OUTPUT"
          echo "new_version_name=$new_name" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version_name }} (code ${{ steps.bump.outputs.new_version_code }}) [skip ci]"
          git push
