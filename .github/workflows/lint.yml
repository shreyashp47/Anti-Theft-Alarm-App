name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        id: lint
        continue-on-error: true
        run: |
          set +e
          ./gradlew lint > lint_output.txt 2>&1
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Post lint result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const exitCode = ${{ steps.lint.outputs.exit_code }};
            let body;

            if (exitCode === 0) {
              body = '## ✅ Lint Passed\n\nNo issues found.';
            } else {
              const reportPath = 'app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt';
              let errors = 'See workflow logs for details.';
              if (fs.existsSync(reportPath)) {
                const content = fs.readFileSync(reportPath, 'utf8');
                const lines = content.split('\n').filter(l => l.includes('Error:'));
                errors = lines.map(l => l.trim()).join('\n');
              }
              body = '## ❌ Lint Failed\n\n```\n' + errors + '\n```';
            }

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && (c.body.startsWith('## ✅') || c.body.startsWith('## ❌'))
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            if (exitCode !== 0) process.exit(1);
